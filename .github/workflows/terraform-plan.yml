name: "Terraform Plan"
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  changes:
    name: "Detect changed stacks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      cluster: ${{ steps.filter.outputs.cluster }}
      data: ${{ steps.filter.outputs.data }}
      platform-addons: ${{ steps.filter.outputs.platform-addons }}
      workloads: ${{ steps.filter.outputs.workloads }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cluster:
              - 'cluster/**'
            data:
              - 'data/**'
            platform-addons:
              - 'platform-addons/**'
            workloads:
              - 'workloads/**'

  plan-cluster:
    needs: changes
    permissions:
      contents: read
      pull-requests: write
    if: needs.changes.outputs.cluster == 'true'
    uses: ./.github/workflows/terraform-plan-stack.yml
    with:
      stack: cluster
      workspace: janice-zhong-fileops-cluster
      directory: ./cluster
    secrets: inherit

  plan-data:
    needs: [changes, plan-cluster]
    permissions:
      contents: read
      pull-requests: write
    if: |
      always() &&
      needs.changes.outputs.data == 'true' &&
      (needs.plan-cluster.result == 'success' || needs.plan-cluster.result == 'skipped')
    uses: ./.github/workflows/terraform-plan-stack.yml
    with:
      stack: data
      workspace: janice-zhong-fileops-data
      directory: ./data
    secrets: inherit

  plan-platform-addons:
    needs: [changes, plan-cluster]
    permissions:
      contents: read
      pull-requests: write
    if: |
      always() &&
      needs.changes.outputs.platform-addons == 'true' &&
      (needs.plan-cluster.result == 'success' || needs.plan-cluster.result == 'skipped')
    uses: ./.github/workflows/terraform-plan-stack.yml
    with:
      stack: platform-addons
      workspace: janice-zhong-fileops-platform-addons
      directory: ./platform-addons
    secrets: inherit

  plan-workloads:
    needs: [changes, plan-platform-addons, plan-data]
    permissions:
      contents: read
      pull-requests: write
    if: |
      always() &&
      needs.changes.outputs.workloads == 'true' &&
      (needs.plan-platform-addons.result == 'success' || needs.plan-platform-addons.result == 'skipped') &&
      (needs.plan-data.result == 'success' || needs.plan-data.result == 'skipped')
    uses: ./.github/workflows/terraform-plan-stack.yml
    with:
      stack: workloads
      workspace: janice-zhong-fileops-workloads
      directory: ./workloads
    secrets: inherit
