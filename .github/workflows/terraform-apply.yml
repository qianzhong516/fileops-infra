# Flow:
# 1. `changes` — compares this push to the previous commit; sets outputs `eks` / `helm`.
# 2. `apply-eks` — runs only if files under `eks/**` changed → uploads `./eks` to HCP workspace `janice-zhong-fileops`.
# 3. `apply-helm` — runs only if files under `helm/**` changed → uploads `./helm` to HCP workspace `janice-zhong-fileops-workload-configs`.
# If both areas change in one push, `apply-helm` runs after `apply-eks` finishes successfully.
name: "Terraform Apply"
on:
  push:
    branches:
      - main

env:
  TF_CLOUD_ORGANIZATION: "janice-zhong"
  TF_API_TOKEN: "${{ secrets.TF_API_TOKEN }}"

jobs:
  changes:
    name: "Detect changed stacks"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      eks: ${{ steps.filter.outputs.eks }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            eks:
              - 'eks/**'
            helm:
              - 'helm/**'

  apply-eks:
    name: "Terraform Apply (eks)"
    needs: changes
    if: needs.changes.outputs.eks == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TF_WORKSPACE: "janice-zhong-fileops"
      CONFIG_DIRECTORY: "./eks"
    steps:
      - uses: actions/checkout@v6

      - name: Upload Configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: apply-upload
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - name: Create Apply Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: apply-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.apply-upload.outputs.configuration_version_id }}

      - name: Apply
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        if: fromJSON(steps.apply-run.outputs.payload).data.attributes.actions.IsConfirmable
        id: apply
        with:
          run: ${{ steps.apply-run.outputs.run_id }}
          comment: "Apply Run from GitHub Actions CI ${{ github.sha }}"

  apply-helm:
    name: "Terraform Apply (helm)"
    needs: [changes, apply-eks]
    # Run after EKS when both stacks changed; if only helm changed, `apply-eks` is skipped — still run helm.
    # `always()` is required so this job is not auto-skipped when `apply-eks` is skipped (GitHub default).
    if: |
      always() &&
      needs.changes.outputs.helm == 'true' &&
      (needs.apply-eks.result == 'success' || needs.apply-eks.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TF_WORKSPACE: "janice-zhong-fileops-workload-configs"
      CONFIG_DIRECTORY: "./helm"
    steps:
      - uses: actions/checkout@v6

      - name: Upload Configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: apply-upload
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}

      - name: Create Apply Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: apply-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.apply-upload.outputs.configuration_version_id }}

      - name: Apply
        uses: hashicorp/tfc-workflows-github/actions/apply-run@v1.3.2
        if: fromJSON(steps.apply-run.outputs.payload).data.attributes.actions.IsConfirmable
        id: apply
        with:
          run: ${{ steps.apply-run.outputs.run_id }}
          comment: "Apply Run from GitHub Actions CI ${{ github.sha }}"
