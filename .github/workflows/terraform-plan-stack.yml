name: Reusable Terraform Plan

on:
  workflow_call:
    inputs:
      stack:
        required: true
        type: string
      workspace:
        required: true
        type: string
      directory:
        required: true
        type: string
      tf_cloud_organization:
        required: true
        type: string
    secrets:
      TF_API_TOKEN:
        required: true

jobs:
  tf-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    env:
      TF_CLOUD_ORGANIZATION: ${{ inputs.tf_cloud_organization }}
      TF_API_TOKEN: "${{ secrets.TF_API_TOKEN }}"

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          cli_config_credentials_token: ${{ env.TF_API_TOKEN }}

      - name: Terraform Init
        id: init
        run: terraform init -input=false
        working-directory: ${{ inputs.directory }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ inputs.directory }}

      - name: Upload Configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.3.2
        id: plan-upload
        with:
          workspace: ${{ inputs.workspace }}
          directory: ${{ inputs.directory }}
          speculative: true

      - name: Create Plan Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.3.2
        id: plan-run
        with:
          workspace: ${{ inputs.workspace }}
          configuration_version: ${{ steps.plan-upload.outputs.configuration_version_id }}
          plan_only: true

      - name: Get Plan Output
        uses: hashicorp/tfc-workflows-github/actions/plan-output@v1.3.2
        id: plan-output
        with:
          plan: ${{ fromJSON(steps.plan-run.outputs.payload).data.relationships.plan.data.id }}

      - name: Update PR
        uses: actions/github-script@v9
        id: plan-comment
        with:
          github-token: ${{ github.token }}
          script: |
            const stack = '${{ inputs.stack }}';
            const marker = `<!-- terraform-plan:${stack} -->`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes(marker)
            );
            const output = `${marker}
            #### HCP Terraform Plan Output: \`${stack}\`
            \`\`\`
            Plan: ${{ steps.plan-output.outputs.add }} to add, ${{ steps.plan-output.outputs.change }} to change, ${{ steps.plan-output.outputs.destroy }} to destroy.
            \`\`\`
            [HCP Terraform Plan](${{ steps.plan-run.outputs.run_link }})
            `;
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: output,
              });
            }
